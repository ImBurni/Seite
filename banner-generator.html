<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS:GO CASE OPENING | IMPERIAL CASE SIMULATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0c15, #030408);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Impact', system-ui, -apple-system, 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Glitch Effekt Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 2;
        }

        /* MAIN CASE CONTAINER */
        .case-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* HEADER */
        .case-header {
            text-align: center;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 70, 0, 0.6));
        }
        .case-header h1 {
            font-size: 3.2rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffd966, #ff9f4a, #ff5e00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 8px #ff4d00;
        }
        .case-header p {
            color: #aaa;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 3D CASE CARD + ANIMATION */
        .case-3d-area {
            perspective: 1200px;
            margin-bottom: 30px;
        }
        .case-card {
            width: 380px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }
        .case-card:hover {
            transform: rotateY(8deg) rotateX(5deg) scale(1.02);
        }
        .case-front, .case-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: linear-gradient(145deg, #1e1a2f, #0c0b16);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 100, 0, 0.5);
        }
        .case-front {
            transform: rotateY(0deg);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none"><path d="M20,20 L80,20 L85,40 L80,60 L50,80 L20,60 L15,40 Z" fill="%23ff6a00" opacity="0.2"/><circle cx="50" cy="50" r="18" stroke="%23ff9900" stroke-width="2" fill="none"/><text x="50" y="55" font-size="12" text-anchor="middle" fill="%23ffcc66" font-weight="bold">★ IMPERIAL ★</text></svg>');
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center 40px;
        }
        .case-back {
            transform: rotateY(180deg);
            background: radial-gradient(circle at 30% 20%, #2a2438, #07050f);
        }
        .case-icon {
            font-size: 7rem;
            filter: drop-shadow(0 0 12px orange);
            margin-top: 30px;
        }
        .case-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 20px;
        }
        .case-sub {
            color: #c0a86a;
            font-weight: bold;
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 10px;
        }

        /* OPEN BUTTON + ANIMATION TRIGGER */
        .open-btn {
            background: radial-gradient(circle at 30% 10%, #ff8800, #b13e00);
            border: none;
            padding: 16px 48px;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            border-radius: 60px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 8px 0 0 #5a2a00, 0 10px 25px rgba(0,0,0,0.5);
            margin: 20px 0;
            font-family: inherit;
        }
        .open-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 0 #5a2a00;
        }
        .open-btn.disabled {
            opacity: 0.6;
            transform: translateY(0);
            pointer-events: none;
            filter: grayscale(0.2);
        }

        /* ROLLING / RESULT AREA */
        .slot-machine {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(16px);
            border-radius: 70px;
            padding: 18px 35px;
            margin: 15px 0;
            width: 90%;
            max-width: 700px;
            border: 1px solid rgba(255,140,0,0.6);
            box-shadow: 0 0 30px rgba(255,80,0,0.2);
        }
        .rolling-items {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 2rem;
            font-weight: bold;
            color: #ffdd99;
            text-shadow: 0 0 5px #ff7b00;
            letter-spacing: 2px;
            min-height: 90px;
            align-items: center;
        }
        .final-item {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(45deg, gold, #ffa500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            word-break: break-word;
        }
        .rarity {
            font-size: 1rem;
            margin-top: 8px;
            color: #ddd;
        }

        /* SKIN CARD ANIMATION (Popup) */
        .skin-reveal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.2);
            width: 340px;
            background: #191e2bdd;
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 28px;
            text-align: center;
            border: 3px solid gold;
            box-shadow: 0 0 100px rgba(255,215,0,0.6);
            z-index: 200;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.3, 0.6, 1);
            pointer-events: none;
        }
        .skin-reveal.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        .skin-reveal h2 {
            font-size: 2rem;
        }
        .close-reveal {
            background: #ff8800;
            margin-top: 20px;
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Animation Flash */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,200,100,0.4) 0%, rgba(255,80,0,0) 80%);
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: 0.08s;
        }
        @keyframes shakeCase {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            20% { transform: translate(-6px, 4px) rotate(-3deg); }
            40% { transform: translate(6px, -3px) rotate(3deg); }
            60% { transform: translate(-4px, 2px) rotate(-2deg); }
            80% { transform: translate(4px, -1px) rotate(1deg); }
            100% { transform: translate(0,0) rotate(0); }
        }
        .shaking {
            animation: shakeCase 0.2s ease-in-out 5;
        }
        .glow-border {
            box-shadow: 0 0 0 4px #ffaa33, 0 0 0 8px #ff5500;
            transition: 0.05s;
        }

        /* Inventory log */
        .inventory-log {
            margin-top: 35px;
            background: #03030be0;
            border-radius: 28px;
            padding: 12px 20px;
            width: 90%;
            max-width: 550px;
            backdrop-filter: blur(8px);
            border-top: 2px solid #ff9f4a;
            font-size: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #ff993355;
            font-family: monospace;
            font-weight: bold;
        }
        .counter {
            font-size: 1rem;
            color: #ffbb77;
        }

        @keyframes particleGlow {
            0% { text-shadow: 0 0 0px gold; }
            100% { text-shadow: 0 0 20px rgb(255, 166, 0); }
        }
    </style>
</head>
<body>

<div class="case-container">
    <div class="case-header">
        <h1>⚡ IMPERIAL CASE ⚡</h1>
        <p>CS:GO LEGACY | ÖFFNE & GEWINNE SELTENE SKINS</p>
    </div>

    <div class="case-3d-area">
        <div class="case-card" id="case3d">
            <div class="case-front">
                <div class="case-icon">📦🔥</div>
                <div class="case-title">IMPERIAL CASE</div>
                <div class="case-sub">★ RARE SPECIAL ITEMS ★</div>
            </div>
            <div class="case-back">
                <div class="case-icon">🔑⚙️</div>
                <div class="case-title">READY?</div>
                <div class="case-sub">CLICK OPEN BUTTON</div>
            </div>
        </div>
    </div>

    <button class="open-btn" id="openCaseBtn">🔓 CASE ÖFFNEN</button>

    <div class="slot-machine" id="slotMachine">
        <div class="rolling-items" id="rollingItems">
            <span>🔮</span><span>✨</span><span>🎲</span><span>💎</span>
        </div>
        <div id="finalResult" style="min-height: 80px;"></div>
    </div>

    <div class="inventory-log">
        <div style="display: flex; justify-content: space-between;"><span>📜 LETZTE DROPS</span><span class="counter" id="caseCounter">Geöffnete Cases: 0</span></div>
        <div id="logList"></div>
    </div>
</div>

<!-- REVEAL MODAL -->
<div class="skin-reveal" id="skinModal">
    <div style="font-size: 4rem;">🎁</div>
    <h2 id="modalItemName">★ Dragon Lore ★</h2>
    <p id="modalRarity" style="font-size: 1.2rem; font-weight: bold;">★ Covert ★</p>
    <button class="close-reveal" id="closeModalBtn">WEITER</button>
</div>
<div class="flash" id="flashOverlay"></div>

<script>
    // ------------------------------
    // CS:GO INSPIRED SKIN DATABASE (QUALITY & RARITY)
    // ------------------------------
    const skinDatabase = [
        // Mil-Spec (Blau) - Gewicht 50%
        { name: "AWP | Paw", rarity: "Mil-Spec", color: "#4a69bd", icon: "🔵", chance: 50, value: "5-10€" },
        { name: "M4A4 | Dragon King", rarity: "Mil-Spec", color: "#4a69bd", icon: "🐉", chance: 50, value: "8€" },
        { name: "AK-47 | Elite Build", rarity: "Mil-Spec", color: "#4a69bd", icon: "⚙️", chance: 50, value: "4€" },
        { name: "USP-S | Cortex", rarity: "Mil-Spec", color: "#4a69bd", icon: "🧠", chance: 50, value: "6€" },
        // Restricted (Violett) - 25%
        { name: "AWP | Redline", rarity: "Restricted", color: "#b34180", icon: "🔴", chance: 25, value: "35€" },
        { name: "AK-47 | Frontside Misty", rarity: "Restricted", color: "#b34180", icon: "🌫️", chance: 25, value: "28€" },
        { name: "M4A1-S | Hyper Beast", rarity: "Restricted", color: "#b34180", icon: "🐺", chance: 25, value: "42€" },
        // Classified (Rosa) - 15%
        { name: "★ Bayonet | Freehand", rarity: "Classified", color: "#e84393", icon: "🗡️", chance: 15, value: "180€", isKnife: true },
        { name: "AK-47 | Fire Serpent", rarity: "Classified", color: "#e84393", icon: "🐍", chance: 15, value: "550€" },
        { name: "Desert Eagle | Blaze", rarity: "Classified", color: "#e84393", icon: "🔥", chance: 15, value: "210€" },
        // Covert (Rot) - 7%
        { name: "AWP | Dragon Lore", rarity: "Covert", color: "#c0392b", icon: "🐉✨", chance: 7, value: "1700€" },
        { name: "M4A4 | Howl", rarity: "Covert", color: "#c0392b", icon: "🐺🔥", chance: 7, value: "2100€" },
        // ★ Legendary / Knife Gold - 3% (Special)
        { name: "★ Karambit | Fade ★", rarity: "★ Legendary ★", color: "#f1c40f", icon: "🔪🌈", chance: 3, value: "2300€", isKnife: true },
        { name: "★ M9 Bayonet | Doppler Phase 2", rarity: "★ Legendary ★", color: "#f1c40f", icon: "💎🔪", chance: 3, value: "1850€", isKnife: true },
        { name: "★ Butterfly Knife | Crimson Web", rarity: "★ Legendary ★", color: "#f1c40f", icon: "🦋🩸", chance: 3, value: "3100€", isKnife: true }
    ];

    // Erstelle gewichtete Auswahl basierend auf Rarität-Chance
    function getRandomSkin() {
        // Erweiterte Liste mit Gewichtung
        let weightedPool = [];
        skinDatabase.forEach(skin => {
            let repeatCount = skin.chance;
            for(let i=0; i<repeatCount; i++) {
                weightedPool.push(skin);
            }
        });
        // zusätzlich Standard filler um genau 100% ähnlichkeit zu gewährleisten
        while(weightedPool.length < 100) weightedPool.push(skinDatabase[0]);
        const randomIndex = Math.floor(Math.random() * weightedPool.length);
        return { ...weightedPool[randomIndex] };
    }

    let caseOpenCount = 0;
    let isAnimating = false;
    const openBtn = document.getElementById('openCaseBtn');
    const rollingDiv = document.getElementById('rollingItems');
    const finalResultDiv = document.getElementById('finalResult');
    const logContainer = document.getElementById('logList');
    const caseCounterSpan = document.getElementById('caseCounter');
    const case3dElement = document.getElementById('case3d');
    const flashOverlay = document.getElementById('flashOverlay');
    const skinModal = document.getElementById('skinModal');
    const modalItemName = document.getElementById('modalItemName');
    const modalRarity = document.getElementById('modalRarity');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function addLogEntry(skinName, rarity, value) {
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        const rarityShort = rarity.substring(0, 4);
        logEntry.innerHTML = `🎲 ${skinName} &nbsp;| ${rarity} &nbsp;| 💰 ${value}`;
        logContainer.prepend(logEntry);
        if(logContainer.children.length > 12) logContainer.removeChild(logContainer.lastChild);
    }

    function updateCounter() {
        caseCounterSpan.innerText = `Geöffnete Cases: ${caseOpenCount}`;
    }

    // coole roll animation (Slot-Maschine)
    async function startRollAnimation(finalSkin) {
        return new Promise((resolve) => {
            const rollItems = ["🔫", "🗡️", "💣", "🧨", "🎯", "⚡", "🔥", "💎", "🔪", "🐉"];
            let rollInterval;
            let rollCount = 0;
            const maxRolls = 18;
            rollInterval = setInterval(() => {
                const randomIcon = rollItems[Math.floor(Math.random() * rollItems.length)];
                rollingDiv.innerHTML = `<span style="font-size:2.2rem;">${randomIcon}</span> <span style="font-size:2rem;">⚙️</span> <span style="font-size:2rem;">${randomIcon}</span> <span style="font-size:2rem;">✨</span>`;
                rollCount++;
                if(rollCount >= maxRolls) {
                    clearInterval(rollInterval);
                    // Finale anzeige mit skin icon und namen
                    let skinIcon = finalSkin.icon || "🎁";
                    rollingDiv.innerHTML = `<div style="text-align:center"><span style="font-size:3rem;">${skinIcon}</span><br/><span style="font-size:1.4rem; font-weight:bold;">${finalSkin.name}</span></div>`;
                    finalResultDiv.innerHTML = `<div class="final-item">✨ ${finalSkin.name} ✨</div><div class="rarity" style="color:${finalSkin.color}">${finalSkin.rarity} | WERT: ${finalSkin.value}</div>`;
                    resolve();
                }
            }, 70);
        });
    }

    function showFlash() {
        flashOverlay.style.opacity = "0.7";
        setTimeout(() => { flashOverlay.style.opacity = "0"; }, 200);
    }

    function animateCaseShake() {
        case3dElement.classList.add('shaking');
        setTimeout(() => {
            case3dElement.classList.remove('shaking');
        }, 500);
    }

    function showSkinModal(skin) {
        modalItemName.innerText = skin.name;
        modalRarity.innerText = `${skin.rarity} | ${skin.value}`;
        modalRarity.style.color = skin.color;
        modalItemName.style.color = skin.color;
        skinModal.classList.add('active');
        // 3d effekt kurz
        const modalBg = document.querySelector('.skin-reveal');
        modalBg.style.transform = "translate(-50%, -50%) scale(1.05)";
        setTimeout(() => { if(skinModal.classList.contains('active')) modalBg.style.transform = "translate(-50%, -50%) scale(1)"; }, 150);
    }

    function closeModal() {
        skinModal.classList.remove('active');
    }

    // MAIN OPEN SEQUENZ
    async function openCase() {
        if(isAnimating) return;
        isAnimating = true;
        openBtn.classList.add('disabled');
        
        // Soundloses visuelles Erlebnis: case shake + glüheffekt
        animateCaseShake();
        showFlash();
        // case 3d kurz glow
        case3dElement.classList.add('glow-border');
        setTimeout(() => case3dElement.classList.remove('glow-border'), 400);
        
        // Warte kurz für die Spannung
        await new Promise(r => setTimeout(r, 280));
        
        // Skin ziehen
        const drawnSkin = getRandomSkin();
        
        // Roll Animation mit item
        await startRollAnimation(drawnSkin);
        
        // add to log & counter
        caseOpenCount++;
        updateCounter();
        addLogEntry(drawnSkin.name, drawnSkin.rarity, drawnSkin.value);
        
        // EPIC REVEAL MODAL (Knife oder Covert besondere Animation)
        const isHighTier = (drawnSkin.rarity === "Covert" || drawnSkin.rarity.includes("Legendary") || drawnSkin.isKnife);
        if(isHighTier) {
            showSkinModal(drawnSkin);
            // extra flash für high tier
            showFlash();
            setTimeout(() => showFlash(), 200);
        } else {
            // kleine fliegende info (optional kurzer toast ähnlich)
            const tempMsg = document.createElement('div');
            tempMsg.innerText = `✔️ ${drawnSkin.name} erhalten!`;
            tempMsg.style.position = 'fixed';
            tempMsg.style.bottom = '30px';
            tempMsg.style.left = '50%';
            tempMsg.style.transform = 'translateX(-50%)';
            tempMsg.style.background = '#000000cc';
            tempMsg.style.backdropFilter = 'blur(12px)';
            tempMsg.style.padding = '12px 25px';
            tempMsg.style.borderRadius = '60px';
            tempMsg.style.color = '#ffcc88';
            tempMsg.style.fontWeight = 'bold';
            tempMsg.style.zIndex = '999';
            tempMsg.style.border = '1px solid gold';
            document.body.appendChild(tempMsg);
            setTimeout(() => tempMsg.remove(), 1800);
        }
        
        // Finaler Countdown Effekt am Case (drehung leicht)
        case3dElement.style.transform = "rotateY(12deg)";
        setTimeout(() => { case3dElement.style.transform = ""; }, 400);
        
        isAnimating = false;
        openBtn.classList.remove('disabled');
    }

    // Eventlistener
    openBtn.addEventListener('click', openCase);
    closeModalBtn.addEventListener('click', closeModal);
    // Optional: Klick auf Overlay schließt modal nicht, nur button
    skinModal.addEventListener('click', (e) => {
        if(e.target === skinModal) closeModal();
    });
    
    // Hintergrundpartikel (kleiner glow effekt bei maus)
    document.body.addEventListener('mousemove', (e) => {
        let glow = document.createElement('div');
        glow.style.position = 'fixed';
        glow.style.width = '40px';
        glow.style.height = '40px';
        glow.style.borderRadius = '50%';
        glow.style.background = 'radial-gradient(circle, rgba(255,100,0,0.3) 0%, rgba(0,0,0,0) 70%)';
        glow.style.pointerEvents = 'none';
        glow.style.left = e.clientX - 20 + 'px';
        glow.style.top = e.clientY - 20 + 'px';
        glow.style.zIndex = '9999';
        document.body.appendChild(glow);
        setTimeout(() => glow.remove(), 300);
    });
    
    // init counter
    updateCounter();
    // kleine intro nachricht
    setTimeout(() => {
        const initMsg = document.createElement('div');
        initMsg.innerText = '🔥 IMPERIAL CASE READY 🔥 - Klick auf ÖFFNEN';
        initMsg.style.position = 'fixed';
        initMsg.style.bottom = '20px';
        initMsg.style.left = '20px';
        initMsg.style.background = '#000000aa';
        initMsg.style.padding = '8px 15px';
        initMsg.style.borderRadius = '20px';
        initMsg.style.fontSize = '12px';
        initMsg.style.color = '#ffaa55';
        document.body.appendChild(initMsg);
        setTimeout(() => initMsg.remove(), 3500);
    }, 500);
</script>
</body>
</html>
