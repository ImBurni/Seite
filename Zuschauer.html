<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuschauer-Liste - Twitch Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #6441a5 0%, #9147ff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .viewer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .viewer-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .viewer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .viewer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .viewer-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #9147ff;
            background: #f0f0f0;
        }

        .viewer-info {
            flex: 1;
        }

        .viewer-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .viewer-name .display-name {
            color: #9147ff;
        }

        .viewer-login {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        .registration-date {
            font-size: 0.85rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .date-badge {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .stats {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #9147ff;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .recent-list {
            text-align: left;
            max-width: 400px;
            margin: 0 auto;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .recent-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #666;
        }

        .refresh-btn {
            background: #9147ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            background: #7a3fe0;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .viewer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Twitch Zuschauer-Liste</h1>
        <div class="subtitle">✨ Registrierte Zuschauer mit Twitch-Profilen ✨</div>
        
        <div id="viewerGrid" class="viewer-grid">
            <div class="empty-state">
                <div style="font-size: 3rem;">📺</div>
                <h3>Lade Zuschauer...</h3>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Zuschauer registriert</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">Heute neu</div>
                </div>
            </div>
            
            <div id="recentSection"></div>
            
            <button class="refresh-btn" onclick="loadViewers()">🔄 Aktualisieren</button>
        </div>
    </div>

    <script>
        // API Endpoint (muss an deine Server-URL angepasst werden)
        const API_URL = 'http://localhost:3000/api/viewers';  // Hier deine API URL
        
        async function loadViewers() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success) {
                    renderViewers(data.viewers);
                    renderStats(data.stats);
                } else {
                    throw new Error('Fehler beim Laden');
                }
            } catch (error) {
                console.error('Fehler:', error);
                document.getElementById('viewerGrid').innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Fehler beim Laden</h3>
                        <p>Bitte stelle sicher, dass der Bot läuft und die API erreichbar ist.</p>
                    </div>
                `;
            }
        }
        
        function renderViewers(viewers) {
            const grid = document.getElementById('viewerGrid');
            
            if (!viewers || viewers.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem;">👥</div>
                        <h3>Noch keine Zuschauer registriert</h3>
                        <p>Schreibe !register im Twitch-Chat, um dich einzutragen!</p>
                    </div>
                `;
                return;
            }
            
            // Sortiere nach Registrierungsdatum (neueste zuerst)
            const sorted = [...viewers].sort((a, b) => 
                new Date(b.registered_at) - new Date(a.registered_at)
            );
            
            grid.innerHTML = sorted.map(viewer => `
                <div class="viewer-card">
                    <div class="viewer-header">
                        <img class="viewer-avatar" 
                             src="${viewer.profile_image_url}" 
                             alt="${viewer.display_name}"
                             onerror="this.src='https://static-cdn.jtvnw.net/user-default-pictures-uv/ebe5cd76-b869-49ca-bbf5-6b3bc3a5f510-profile_image-70x70.png'">
                        <div class="viewer-info">
                            <div class="viewer-name">
                                <span class="display-name">${escapeHtml(viewer.display_name)}</span>
                            </div>
                            <div class="viewer-login">@${viewer.username}</div>
                            <div class="registration-date">
                                📅 ${formatDate(viewer.registered_date)} ${viewer.registered_time ? 'um ' + viewer.registered_time : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderStats(stats) {
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('todayCount').textContent = stats.today;
            
            const recentSection = document.getElementById('recentSection');
            if (stats.recent && stats.recent.length > 0) {
                recentSection.innerHTML = `
                    <h3 style="margin: 20px 0 10px 0;">🆕 Letzte Registrierungen</h3>
                    <div class="recent-list">
                        ${stats.recent.map(v => `
                            <div class="recent-item">
                                <img class="recent-avatar" src="${v.profile_image_url}" 
                                     onerror="this.src='https://static-cdn.jtvnw.net/user-default-pictures-uv/ebe5cd76-b869-49ca-bbf5-6b3bc3a5f510-profile_image-70x70.png'">
                                <span><strong>${escapeHtml(v.display_name)}</strong> @${v.username}</span>
                                <span style="margin-left: auto; font-size: 0.8rem; color: #666;">${v.registered_date}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                recentSection.innerHTML = '';
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Unbekannt';
            return dateStr;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // URL-Parameter prüfen (für direkte Registrierungs-Links)
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const registerUser = params.get('register');
            
            if (registerUser) {
                showNotification(`✨ ${registerUser} hat sich gerade registriert!`, 'success');
                // URL bereinigen ohne Reload
                window.history.replaceState({}, document.title, window.location.pathname);
                loadViewers(); // Reload nach Registrierung
            }
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'success' ? '#4caf50' : '#2196f3';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Auto-Refresh alle 30 Sekunden
        loadViewers();
        checkUrlParams();
        setInterval(loadViewers, 30000);
    </script>
</body>
</html>
