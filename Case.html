<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Casino</title>

<style>
body {
    background: #020617;
    color: white;
    text-align: center;
    font-family: Arial;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

#code {
    font-size: 30px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔐 Twitch Login</h1>

<button onclick="getCode()">Login starten</button>

<div id="code"></div>
<div id="status"></div>

<script>

let currentCode = null;

// ----------------------
// CODE GENERIEREN
// ----------------------
function getCode() {

    currentCode = generateCode();

    document.getElementById("code").innerText =
        "Dein Code: " + currentCode;

    document.getElementById("status").innerText =
        "👉 Schreibe im Chat: !confirm " + currentCode;

    checkLogin();
}

// ----------------------
// FAKE CODE (Website)
// ----------------------
function generateCode() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let code = "";
    for (let i = 0; i < 6; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
}

// ----------------------
// CHECK LOGIN
// ----------------------
function checkLogin() {

    let interval = setInterval(async () => {

        try {
            let res = await fetch("login_sessions.json");
            let data = await res.json();

            if (data[currentCode]) {

                document.getElementById("status").innerText =
                    "✅ Eingeloggt als " + data[currentCode].user;

                clearInterval(interval);
            }

        } catch {}

    }, 2000);
}

</script>

</body>
</html>
