<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>🎰 Title Casino</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    margin-top: 30px;
    font-size: 40px;
    text-shadow: 0 0 20px #22c55e;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    background: #22c55e;
    color: black;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #22c55e;
}

#slot {
    font-size: 30px;
    margin-top: 40px;
    height: 60px;
    transition: 0.2s;
}

.glow {
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #22c55e; }
    to { text-shadow: 0 0 25px #22c55e; }
}

.win {
    animation: win 0.6s ease;
}

@keyframes win {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
}

.box {
    margin-top: 30px;
}

#info {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>🎰 TITLE CASINO</h1>

<div class="box">
    <button onclick="login()">🔐 Login</button>
    <button onclick="spin()">🎲 Spin</button>
</div>

<div id="slot">---</div>
<div id="info"></div>

<script>

// ------------------
// STATE
// ------------------
let user = null;
let tokens = 5;

// ------------------
// TITLES SYSTEM
// ------------------
let titles = [];

function createTitles() {
    for (let i = 1; i <= 100; i++) {

        let rarity = "common";
        let chance = 70;

        if (i <= 5) { rarity = "legendary"; chance = 1; }
        else if (i <= 15) { rarity = "epic"; chance = 5; }
        else if (i <= 40) { rarity = "rare"; chance = 15; }

        titles.push({
            id: "title_" + i,
            name: getStyledName(i, rarity),
            rarity: rarity,
            chance: chance
        });
    }
}

function getStyledName(i, rarity) {
    if (rarity === "legendary") return "👑 𝓛𝓮𝓰𝓮𝓷𝓭 #" + i;
    if (rarity === "epic") return "🔥 𝐄𝐩𝐢𝐜 #" + i;
    if (rarity === "rare") return "💎 𝕽𝖆𝖗𝖊 #" + i;
    return "⚡ Title #" + i;
}

createTitles();

// ------------------
// LOGIN
// ------------------
function login() {
    let name = prompt("Twitch Name:");
    if (!name) return;

    user = {
        id: name.toLowerCase(),
        name: name
    };

    document.getElementById("info").innerText =
        "✅ Eingeloggt als " + user.name + " | Tokens: " + tokens;
}

// ------------------
// SPIN ANIMATION
// ------------------
async function spin() {

    if (!user) {
        alert("Bitte einloggen!");
        return;
    }

    if (tokens <= 0) {
        alert("Keine Tokens!");
        return;
    }

    tokens--;

    let slot = document.getElementById("slot");
    slot.classList.add("glow");

    // Fake Slot Animation
    for (let i = 0; i < 15; i++) {
        let rand = titles[Math.floor(Math.random() * titles.length)];
        slot.innerText = rand.name;
        await sleep(80 + i * 10);
    }

    let win = getRandomTitle();

    slot.innerText = win.name;
    slot.classList.remove("glow");
    slot.classList.add("win");

    setTimeout(() => slot.classList.remove("win"), 600);

    document.getElementById("info").innerText =
        `🎉 ${user.name} gewinnt ${win.name} | Tokens: ${tokens}`;

    save(win.id);
}

// ------------------
// RANDOM LOGIC
// ------------------
function getRandomTitle() {
    let pool = [];

    titles.forEach(t => {
        for (let i = 0; i < t.chance; i++) {
            pool.push(t);
        }
    });

    return pool[Math.floor(Math.random() * pool.length)];
}

// ------------------
// SAVE
// ------------------
function save(title) {

    let data = JSON.parse(localStorage.getItem("titles") || "{}");

    if (!data[user.id]) {
        data[user.id] = {
            name: user.name,
            titles: [],
            tokens: tokens
        };
    }

    if (!data[user.id].titles.includes(title)) {
        data[user.id].titles.push(title);
    }

    data[user.id].tokens = tokens;

    localStorage.setItem("titles", JSON.stringify(data));

    download(data);
}

// ------------------
// DOWNLOAD JSON
// ------------------
function download(data) {
    let blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "titles.json";
    a.click();
}

// ------------------
function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
