<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Case Opening</title>

<style>
body{
  margin:0;
  background:#0c0c12;
  color:white;
  font-family:Inter, sans-serif;
  text-align:center;
}

/* BUTTON */
#openBtn{
  margin-top:40px;
  padding:14px 24px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#5865f2,#7c3aed);
  color:white;
  font-weight:600;
}

/* CASE */
#case{
  margin-top:60px;
  height:160px;
  overflow:hidden;
  position:relative;
}

/* FADE */
#case::before,
#case::after{
  content:"";
  position:absolute;
  top:0;
  width:200px;
  height:100%;
  z-index:5;
  pointer-events:none;
}

#case::before{
  left:0;
  background:linear-gradient(to right,#0c0c12,transparent);
}
#case::after{
  right:0;
  background:linear-gradient(to left,#0c0c12,transparent);
}

/* TRACK */
#track{
  display:flex;
  align-items:center;
  height:100%;
  position:absolute;
  will-change:transform;
}

/* ITEM */
.item{
  width:120px;
  height:120px;
  margin:0 8px;
  border-radius:12px;
  background:#1b1b24;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:.2s;
}

/* RARITY */
.common{background:#2a2a33;}
.rare{background:#2563eb;}
.epic{background:#7c3aed;}
.legendary{background:#f59e0b;}
.mythic{
  background:#ff2bd6;
  box-shadow:0 0 20px #ff2bd6;
}

/* CENTER */
#center{
  position:absolute;
  left:50%;
  width:2px;
  height:100%;
  background:white;
  transform:translateX(-50%);
}

/* RESULT */
#result{
  margin-top:40px;
  font-size:24px;
}
</style>
</head>

<body>

<h2>🎁 Case Opening</h2>

<button id="openBtn">OPEN</button>

<div id="case">
  <div id="center"></div>
  <div id="track"></div>
</div>

<div id="result"></div>

<!-- 🔊 SOUND FIX (LOCAL CLICK TRIGGER) -->
<audio id="spin" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c6e76.mp3"></audio>
<audio id="win" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c9b3c0c1b7.mp3"></audio>

<script>
const items = [
  {name:"50", class:"common", weight:50},
  {name:"100", class:"rare", weight:30},
  {name:"200", class:"epic", weight:15},
  {name:"500", class:"legendary", weight:4},
  {name:"1000", class:"mythic", weight:1}
];

const track = document.getElementById("track");
const btn = document.getElementById("openBtn");

function weighted(){
  let total = items.reduce((a,b)=>a+b.weight,0);
  let r = Math.random()*total;
  for(let i of items){
    if(r < i.weight) return i;
    r -= i.weight;
  }
}

function build(winner){
  track.innerHTML="";

  for(let i=0;i<60;i++){
    let item = i===50 ? winner : weighted();

    const div = document.createElement("div");
    div.className = "item " + item.class;
    div.innerText = item.name;
    track.appendChild(div);
  }
}

btn.onclick = ()=>{
  const spinSound = document.getElementById("spin");
  const winSound = document.getElementById("win");

  spinSound.currentTime = 0;
  spinSound.play();

  const winner = weighted();
  build(winner);

  const itemWidth = 136; // inkl margin
  const centerIndex = 50;

  const offset = (centerIndex * itemWidth) - (window.innerWidth/2) + (itemWidth/2);

  track.style.transition = "transform 4.5s cubic-bezier(.1,.8,.2,1)";
  track.style.transform = `translateX(-${offset}px)`;

  setTimeout(()=>{
    spinSound.pause();
    winSound.play();

    const itemsDOM = document.querySelectorAll(".item");
    const el = itemsDOM[centerIndex];

    el.style.transform="scale(1.2)";
    el.style.boxShadow="0 0 40px white";

    document.getElementById("result").innerText =
      "Gewonnen: " + el.innerText + " Punkte";
  },4600);
};
</script>

</body>
</html>
