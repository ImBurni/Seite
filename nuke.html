<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial;
}
.container{
position:absolute;
bottom:40px;
left:40px;
display:flex;
align-items:center;
gap:25px;
}
.symbol{
font-size:120px;
animation:spin 6s linear infinite;
filter:drop-shadow(0 0 30px orange) drop-shadow(0 0 60px red);
}
@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
.counter{
font-size:100px;
font-weight:900;
color:white;
text-shadow:
0 0 10px orange,
0 0 30px red,
0 0 50px orange;
}
.label{
font-size:20px;
opacity:0.8;
letter-spacing:5px;
}
</style>
</head>
<body>
<div class="container">
<div class="symbol">☢</div>
<div>
<div class="counter" id="count">0</div>
<div class="label">NUCLEAR</div>
</div>
</div>
<script>
const params = new URLSearchParams(window.location.search)
let nukes = params.get("nukes") || 0
document.getElementById("count").textContent = nukes
</script>
</body>
</html>
